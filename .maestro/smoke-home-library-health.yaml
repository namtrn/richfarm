appId: com.mygarden.app
---
- openLink:
    link: com.mygarden.app://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- runFlow:
    when:
      visible:
        id: e2e-onboarding-start-button
    commands:
      - tapOn:
          id: e2e-onboarding-start-button
- extendedWaitUntil:
    visible:
      id: e2e-tab-home
    timeout: 60000
- tapOn:
    id: e2e-tab-home
- assertVisible:
    id: e2e-home-title
- tapOn:
    id: e2e-tab-library
- tapOn:
    id: e2e-library-tab-pests
- assertVisible:
    id: e2e-library-tab-pests-content
