appId: com.mygarden.app
---
- openLink:
    link: com.mygarden.app://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- runFlow:
    when:
      visible:
        id: e2e-onboarding-start-button
    commands:
      - tapOn:
          id: e2e-onboarding-start-button
- extendedWaitUntil:
    visible:
      id: e2e-tab-home
    timeout: 60000
- tapOn:
    id: e2e-tab-home
- tapOn:
    id: e2e-tab-garden
- tapOn:
    id: e2e-garden-quick-planning
- tapOn:
    id: e2e-garden-quick-planning
    optional: true
- tapOn:
    id: e2e-tab-reminder
- tapOn:
    id: e2e-tab-library
- tapOn:
    id: e2e-library-shortcut-health
    optional: true
- tapOn:
    id: e2e-health-tab-light
    optional: true
- tapOn:
    id: e2e-tab-library
- tapOn:
    id: e2e-library-search-input
- eraseText
- inputText: to
- tapOn:
    id: e2e-library-plant-card
    optional: true
- tapOn:
    id: e2e-library-modal-close
    optional: true
- tapOn:
    id: e2e-tab-more
- tapOn:
    id: e2e-profile-sync-now
    optional: true
- tapOn:
    id: e2e-profile-save-settings
    optional: true
